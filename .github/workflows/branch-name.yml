name: Branch Name

on:
  push:
    branches-ignore:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  branch-name:
    name: branch-name
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          pattern='^(feature|fix|chore|docs|refactor|test|ci|build|infra|copilot)\/[a-z0-9]+([a-z0-9-]*[a-z0-9])?$'
          if ! echo "$branch" | grep -qE "$pattern"; then
            echo "Error: Branch name '${branch}' does not match the required pattern."
            echo "Branch names must use an approved prefix (feature/, fix/, chore/, docs/,"
            echo "refactor/, test/, ci/, build/, infra/, or copilot/) followed by"
            echo "lowercase kebab-case (e.g. feature/my-new-feature)."
            exit 1
          fi
          echo "Branch name '${branch}' is valid."
