name: Continuous Integration

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate PR title
        run: |
          title="${{ github.event.pull_request.title }}"
          if [ -z "$title" ]; then
            echo "Error: PR title must not be empty."
            exit 1
          fi
          normalized="$(echo "$title" | tr '[:upper:]' '[:lower:]')"
          echo "chore: ${normalized}" | pnpm exec commitlint

  validate:
    name: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run validation
        run: pnpm validate
