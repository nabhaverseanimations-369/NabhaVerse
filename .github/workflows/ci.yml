name: Continuous Integration

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ -z "$PR_TITLE" ]; then
            echo "Error: PR title must not be empty."
            exit 1
          fi
          normalized="$(echo "$PR_TITLE" | tr '[:upper:]' '[:lower:]')"
          echo "chore: ${normalized}" | pnpm exec commitlint

  validate:
    name: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run validation
        run: pnpm validate
