name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
      - "refactor/**"
      - "test/**"
      - "ci/**"
      - "build/**"
      - "infra/**"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: pnpm typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: pnpm test

  build-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: pnpm build

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: echo "${{ github.event.pull_request.title }}" | pnpm exec commitlint
