services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nabhaverse
      POSTGRES_USER: nabhaverse
      POSTGRES_PASSWORD: nabhaverse
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: uvicorn nabhaverse_api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: ******postgres:5432/nabhaverse
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /workspace/apps/api/src:/workspace/apps/workers/src
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace

  workers:
    build:
      context: .
      dockerfile: docker/workers.Dockerfile
    command: celery -A nabhaverse_workers.celery_app:celery_app worker --loglevel=info
    environment:
      DATABASE_URL: ******postgres:5432/nabhaverse
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /workspace/apps/api/src:/workspace/apps/workers/src
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/workspace

volumes:
  postgres-data:
